    description: >-
      Read API surface for the Tensor marketplace covering collections, NFT mint metadata, active listings, bids
      (collection-wide, single-NFT, trait), TSwap and TAmm pool state, user portfolios, transaction history, royalty
      enforcement metadata, priority fee oracle, and whitelist verification. Authenticate via the `x-tensor-api-key`
      header issued through the Tensor Developer Hub.
  - aid: tensor:tensor-tx-api
    name: Tensor Transaction API
    tags:
      - NFT
      - Marketplace
      - Solana
      - Blockchain
      - Web3
      - Trading
      - Transactions
      - Listings
      - Bids
      - Write
    humanURL: https://dev.tensor.trade/reference
    baseURL: https://api.mainnet.tensordev.io
    properties:
      - url: https://dev.tensor.trade/reference
        type: Documentation
      - url: openapi/tensor-tx-api-openapi.yml
        type: OpenAPI
      - url: examples/tensor-tx-list-example.json
        type: Examples
      - url: examples/tensor-tx-buy-example.json
        type: Examples
    description: >-
      Server-side transaction construction API that returns base64-encoded unsigned Solana transactions for the
      canonical Tensor marketplace flows — list, delist, edit listing, buy, place/accept/cancel collection bid,
      single-NFT bid, trait bid, deposit/withdraw escrow, create/edit/close AMM pool. Clients sign locally with the
      user's wallet and submit. Covers standard NFTs, programmable NFTs (pNFT), and compressed NFTs (cNFT).
  - aid: tensor:tensor-websocket-api
    name: Tensor WebSocket API
    tags:
      - NFT
      - Marketplace
      - Solana
      - Blockchain
      - Web3
      - Realtime
      - Streaming
      - WebSocket
      - Events
    humanURL: https://dev.tensor.trade/reference
    baseURL: wss://api.mainnet.tensordev.io
    properties:
      - url: https://dev.tensor.trade/reference
        type: Documentation
      - url: asyncapi/tensor-websocket-api-asyncapi.yml
        type: AsyncAPI
    description: >-
      Subscription-based realtime stream of Tensor marketplace events. Channels include `newTransaction` (every
      confirmed marketplace action), `ammOrderUpdate` / `ammOrderUpdateAll` (TSwap and TAmm pool state),
      `tcompBidUpdate` / `tcompBidUpdateAll` (compressed-NFT collection bids), `ping`, and `unsubscribe`. Used to power
      floor-price feeds, sales bots, and order-book mirroring.
