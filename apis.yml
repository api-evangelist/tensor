position: Providing
description: >-
  Tensor is the Solana-native NFT marketplace and trading protocol founded by Tensor HQ and now stewarded by the Tensor
  Foundation. The platform exposes a public read REST API, a transaction-construction (TX) API that returns unsigned
  Solana transactions for list / buy / bid / pool flows, and a WebSocket subscription stream for realtime marketplace
  events. Five open-source Anchor programs — Marketplace, AMM v2, Whitelist, Escrow, and Fees — back the protocol and
  ship as `@tensor-foundation/*` JavaScript SDKs and `tensor-*` Rust crates. Tensor supports legacy NFTs, programmable
  NFTs (pNFT), and Bubblegum compressed NFTs (cNFT), and serves as the execution layer behind aggregators, wallets,
  sales bots, and AMM bonding-curve liquidity providers across the Solana ecosystem. Governance and ecosystem grants
  flow through the TNSR token and the Tensor DAO on Realms.
